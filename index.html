<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>48x48 Pixel Pattern Animator</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1b1d2a, #050507 65%);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .frame {
        display: grid;
        gap: 0.75rem;
        justify-items: center;
        padding: 1rem;
        border: 1px solid #3f4558;
        border-radius: 10px;
        background: rgba(10, 12, 20, 0.8);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
      }

      canvas {
        width: 480px;
        height: 480px;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        border: 2px solid #8f98b3;
        background: #07090f;
      }

      .label {
        color: #c6cde5;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <canvas id="pixel-grid" width="48" height="48" aria-label="Animated 48 by 48 pixel square"></canvas>
      <div class="label">48×48 canvas with 4×4 animated cells (12×12 grid)</div>
    </div>

    <script>
      const canvas = document.getElementById('pixel-grid');
      const ctx = canvas.getContext('2d');

      const CELL_SIZE = 4;
      const GRID_SIZE = canvas.width / CELL_SIZE;

      const palettes = [
        ['#091626', '#16c79a', '#5eead4', '#f8ff91'],
        ['#0f1021', '#ff5d8f', '#fcbf49', '#7ee8fa'],
        ['#140f2d', '#8a5cf6', '#1dd3b0', '#eeef20'],
        ['#06121b', '#2dd4bf', '#38bdf8', '#f472b6']
      ];

      const shade = (hex, amount) => {
        const value = hex.replace('#', '');
        const num = Number.parseInt(value, 16);
        const r = Math.max(0, Math.min(255, (num >> 16) + amount));
        const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amount));
        const b = Math.max(0, Math.min(255, (num & 0xff) + amount));
        return `rgb(${r}, ${g}, ${b})`;
      };

      function draw(time) {
        const t = time * 0.001;
        const palette = palettes[Math.floor(t / 7) % palettes.length];

        for (let y = 0; y < GRID_SIZE; y += 1) {
          for (let x = 0; x < GRID_SIZE; x += 1) {
            const waveA = Math.sin((x + t * 3.2) * 0.7);
            const waveB = Math.cos((y - t * 2.3) * 0.9);
            const radial = Math.sin(Math.hypot(x - GRID_SIZE / 2, y - GRID_SIZE / 2) * 0.85 - t * 4.5);
            const checker = ((x + y + Math.floor(t * 6)) % 2) * 0.35;
            const value = waveA + waveB + radial + checker;

            const idx = Math.abs(Math.floor((value + 2.5) * 1.1)) % palette.length;
            const pulse = Math.sin(t * 6 + x * 0.4 - y * 0.3) * 18;

            ctx.fillStyle = shade(palette[idx], pulse);
            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }

        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    </script>
  </body>
</html>
